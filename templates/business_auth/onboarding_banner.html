{% if session.get('onboarding_incomplete') %}
<div class="alert alert-warning alert-dismissible fade show mb-4" role="alert" style="border-left: 4px solid #ffc107;">
    <div class="d-flex align-items-start">
        <div class="flex-shrink-0 me-3">
            <i class="fas fa-clipboard-list fa-2x text-warning"></i>
        </div>
        <div class="flex-grow-1">
            <h5 class="alert-heading mb-2">
                <i class="fas fa-exclamation-triangle"></i> Complete Your Account Setup
            </h5>
            <p class="mb-2">
                You have incomplete setup tasks. Complete these steps to unlock the full potential of your VOÏA account.
            </p>
            <div class="mt-3">
                <a href="{{ session.get('onboarding_url', url_for('business_auth.onboarding_progress')) }}" class="btn btn-warning btn-sm">
                    <i class="fas fa-tasks"></i> View Setup Progress
                </a>
                <a href="{{ url_for('business_auth.email_config') }}" class="btn btn-outline-secondary btn-sm ms-2">
                    <i class="fas fa-envelope"></i> Email Setup
                </a>
                <a href="{{ url_for('business_auth.manage_users') }}" class="btn btn-outline-secondary btn-sm ms-2">
                    <i class="fas fa-users"></i> Team Members
                </a>
            </div>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
</div>
{% endif %}

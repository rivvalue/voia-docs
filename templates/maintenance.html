{% extends "base.html" %}

{% block title %}VOÏA demo request{% endblock %}

{% block extra_head %}
<!-- Load Brand Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Karla:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* Hide language selector on maintenance page */
.language-selector-wrapper {
    display: none !important;
}
</style>
{% endblock %}

{% block content %}
<main role="main" aria-label="VOÏA coming soon page">
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <!-- Hero Section -->
            <header class="index-hero text-center">
                <h1 class="index-hero-title">VO<span class="index-hero-accent">Ï</span>A</h1>
                <p class="index-hero-subtitle">Turning voices into value</p>
            </header>

            <!-- CTA Section -->
            <section class="text-center section-spacing" aria-labelledby="cta-heading">
                <h2 id="cta-heading" class="visually-hidden">Request Demo</h2>
                <a href="https://www.rivvalue.com/voia#demo" 
                   target="_blank" 
                   rel="noopener noreferrer" 
                   class="index-btn-cta" 
                   aria-label="Get your demo access">
                    <i class="fas fa-calendar-check me-2" aria-hidden="true"></i>Get Your Demo Access
                </a>
            </section>
        </div>
    </div>
</main>
{% endblock %}

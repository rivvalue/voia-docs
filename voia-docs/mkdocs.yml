site_name: VOÏA Documentation
site_description: Voice of Client - AI-Powered Voice Of Client Platform for B2B.
site_author: VOÏA Platform
site_url: https://voia-docs.rivvalue.com
copyright: Copyright &copy; 2026 VOÏA - By Rivvalue inc.

theme:
  name: material
  custom_dir: overrides
  language: en
  palette:
    primary: custom
    accent: custom
  font:
    text: Karla
    code: Roboto Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  logo: assets/logo.png
  favicon: assets/logo.png

plugins:
  - search:
      lang:
        - en
        - fr
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
          nav:
            - Overview: overview.md
            - Getting Started: index.md
            - Features: features.md
            - QBR Intelligence: qbr.md
            - Licenses: licenses.md
        - locale: fr
          name: Français
          build: true
          nav:
            - Présentation: overview.md
            - Démarrage: index.md
            - Fonctionnalités: features.md
            - Intelligence QBR: qbr.md
            - Licences: licenses.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_css:
  - overrides/custom.css

extra:
  social:
    - icon: fontawesome/solid/globe
      link: https://rivvalue.com/voia
      name: VOÏA - AI Powered Voice Of Client platform for B2B, By Rivvalue inc.

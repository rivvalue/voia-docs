<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <!-- VOÏA Logo with V2 Branding -->
  <defs>
    <linearGradient id="voiaGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E13A44;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C52D36;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Icon: Voice wave -->
  <g transform="translate(15, 30)">
    <circle cx="0" cy="0" r="3" fill="url(#voiaGradient)"/>
    <path d="M 8 -8 Q 12 0 8 8" stroke="#E13A44" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 14 -12 Q 20 0 14 12" stroke="#E13A44" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M 20 -16 Q 28 0 20 16" stroke="#E13A44" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  </g>
  
  <!-- Text: VOÏA -->
  <text x="50" y="38" font-family="'Montserrat', sans-serif" font-size="24" font-weight="700" fill="#1a1a1a" letter-spacing="-0.5">VOÏA</text>
  
  <!-- Subtitle -->
  <text x="120" y="38" font-family="'Karla', sans-serif" font-size="11" fill="#8A8A8A">Voice of Client</text>
</svg>
